name: Amazon Scraper Scheduler

on:
  workflow_dispatch:

  schedule:
    - cron: '*/2 * * * *'   # Runs every 2 minutes (Testing)

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      # Download repository files
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Install Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Upgrade pip
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      # Install Python packages
      - name: Install Requirements
        run: |
          pip install -r requirements.txt

      # Install Playwright
      - name: Install Playwright
        run: |
          pip install playwright

      # Install Chromium Browser
      - name: Install Chromium
        run: |
          playwright install chromium

      # Create Google Credentials JSON file
      - name: Create Google Credentials File
        run: |
          echo '${{ secrets.GOOGLECREDENTIALS }}' > credentials.json

      # Optional - Display repository files (Debugging)
      - name: Show Repository Files
        run: |
          pwd
          ls -la

      # Run Amazon Scraper
      - name: Run Python Script
        run: |
          python new_amazon.py
